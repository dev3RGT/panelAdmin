    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

    .auth-gate{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;transition:opacity .4s ease}

function exportJobPDF(job, shopInfo){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const pw=doc.internal.pageSize.getWidth();
  const shopName=shopInfo?.shop||'VynixPanelB Auto';
  const adminName=shopInfo?.name||'Admin';
  doc.setFillColor(7,12,26); doc.rect(0,0,pw,42,'F');
  doc.setFillColor(26,79,255); doc.rect(0,0,4,42,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(20); doc.setTextColor(232,238,255);
  doc.text(shopName,14,16);
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(150,170,220);
  doc.text('Vehicle Service Quotation',14,24);
  doc.text(`Issued: ${new Date().toLocaleDateString('en-ZA',{day:'2-digit',month:'long',year:'numeric'})}`,14,31);
  doc.text(`Ref: JOB-${job.id.slice(-8).toUpperCase()}`,pw-14,24,{align:'right'});
  doc.text(`Authorised by: ${adminName}`,pw-14,31,{align:'right'});
  if(job.status==='approved'){doc.setTextColor(0,255,136);doc.setFontSize(48);doc.setFont('helvetica','bold');doc.setGState(new doc.GState({opacity:0.06}));doc.text('APPROVED',pw/2,150,{align:'center',angle:45});doc.setGState(new doc.GState({opacity:1}));}
  doc.setFillColor(15,22,55);doc.roundedRect(10,48,pw-20,24,3,3,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(0,245,255);doc.text('VEHICLE INFORMATION',16,57);
  doc.setFont('helvetica','normal');doc.setTextColor(200,210,240);doc.setFontSize(9);
  const v=job.vehicle||{};
  doc.text(`${v.make||'—'} ${v.model||'—'} ${v.year||''}`,16,64);
  doc.text(`Reg: ${v.reg||'—'}   Engine: ${v.engine||'—'}   Odometer: ${v.km||'—'} km`,16,70);
  if(v.vin) doc.text(`VIN: ${v.vin}`,16,76);
  doc.setFillColor(20,30,65);doc.roundedRect(pw-100,48,90,24,3,3,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(0,245,255);doc.text('MECHANIC',pw-96,57);

    // FIX: Assign callback to variable to properly unmount

      if(!snap.exists()){setJobs([]);return;}
      const arr=[];
      snap.forEach(c=>arr.push({id:c.key,...c.val()}));

              <div><p style={{fontSize:13,fontWeight:600,color:'var(--text2)',margin:0}}>{job.mechanic?.name||'—'}</p><p style={{fontSize:11,color:'var(--text3)',margin:'2px 0 0'}}>{job.mechanic?.shop||'—'}</p></div>
              <div><p className="mono" style={{fontSize:12,fontWeight:700,color:'var(--text)',margin:0}}>{job.vehicle?.reg||'—'}</p><p style={{fontSize:11,color:'var(--text3)',margin:'2px 0 0'}}>{job.vehicle?.year||'—'}</p></div>
              <span style={{fontSize:13,fontWeight:600,color:'var(--text2)'}}>{(job.services||[]).length} service(s)</span>
              <span className="mono" style={{fontSize:13,fontWeight:700,color:'var(--accent)'}}>R {(job.financials?.grandTotal||0).toFixed(0)}</span>
              <div style={{display:'flex',gap:6,alignItems:'center',justifyContent:'space-between'}}>
                <span style={{padding:'3px 9px',borderRadius:100,fontSize:9,fontWeight:700,fontFamily:'JetBrains Mono',background:job.status==='approved'?'rgba(0,255,136,0.1)':job.status==='rejected'?'rgba(255,80,80,0.1)':'rgba(255,184,0,0.1)',color:job.status==='approved'?'var(--green)':job.status==='rejected'?'var(--red)':'var(--amber)',border:`1px solid ${job.status==='approved'?'rgba(0,255,136,0.2)':job.status==='rejected'?'rgba(255,80,80,0.2)':'rgba(255,184,0,0.2)'}`}}>{job.status==='pending_approval'?'PENDING':job.status==='approved'?'APPROVED':'REJECTED'}</span>
                <span style={{color:'var(--text3)',fontSize:12}}>›</span>
              </div>
            </div>
          </div>
        ))}
      </div>
      {selected&&<JobModal job={selected} onClose={()=>setSelected(null)} onStatusChange={setStatus} shopInfo={shopInfo}/>}
    </div>
  );
}

/* ─── OVERVIEW ─── */
function OverviewView({shopInfo}){
  const [jobs,setJobs]=useState(null);
  const [recent,setRecent]=useState(null);
  const [selected,setSelected]=useState(null);
  
  useEffect(()=>{
    // Increased to 500 to ensure all data is visible for analytics
    const ref=db.ref('workshop_jobs').limitToLast(500);
    // FIX: Assign callback to variable to properly unmount
    const cb = ref.on('value',snap=>{
      if(!snap.exists()){setJobs([]);setRecent([]);return;}
      const arr=[];
      snap.forEach(c=>arr.push({id:c.key,...c.val()}));
      arr.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
      setJobs(arr);
      setRecent(arr.slice(0,5)); // Show only 5 most recent on dashboard cards
    });
    // FIX: Explicitly kill only THIS specific listener
    return()=>ref.off('value', cb);
  },[]);
  
  const setStatus=async(id,s)=>db.ref(`workshop_jobs/${id}`).update({status:s,updatedAt:Date.now()});
  const pending=jobs?jobs.filter(j=>j.status==='pending_approval').length:0;
  const approved=jobs?jobs.filter(j=>j.status==='approved').length:0;
  const revenue=jobs?jobs.filter(j=>j.status==='approved').reduce((s,j)=>s+(j.financials?.grandTotal||0),0):0;
  const svcCounts=useMemo(()=>{if(!jobs)return[];const c={};jobs.forEach(j=>(j.services||[]).forEach(s=>{c[s.name]=(c[s.name]||0)+1;}));return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,5);},[jobs]);
  
  return(
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      <div><h2 style={{fontSize:22,fontWeight:900,color:'var(--text)',margin:0}}>Admin Overview</h2><p style={{fontSize:13,color:'var(--text2)',margin:'4px 0 0'}}>Real-time workshop intelligence</p></div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
        {[{l:'Pending Approval',v:pending,c:'var(--amber)',icon:'⏳',sub:'Awaiting your review'},{l:'Approved Today',v:approved,c:'var(--green)',icon:'✅',sub:'Revenue generating'},{l:'Approved Revenue',v:`R ${Math.round(revenue).toLocaleString()}`,c:'var(--green)',icon:'💰',sub:'Incl. VAT'}].map(s=>(
          <div key={s.l} className="stat-card" style={{display:'flex',flexDirection:'column',gap:10}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}><p style={{fontSize:10,fontWeight:700,color:'var(--text3)',margin:0,letterSpacing:'0.5px'}}>{s.l.toUpperCase()}</p><span style={{fontSize:20}}>{s.icon}</span></div>
            <p className="mono" style={{fontSize:26,fontWeight:900,color:s.c,margin:0}}>{s.v}</p>
            <p style={{fontSize:11,color:'var(--text3)',margin:0}}>{s.sub}</p>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:20,overflow:'hidden'}}>
          <div style={{padding:'14px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:8}}><h3 style={{fontSize:14,fontWeight:800,color:'var(--text)',margin:0}}>Recent Arrivals</h3><span style={{fontSize:10,color:'var(--green)',fontFamily:'JetBrains Mono',fontWeight:600,display:'flex',alignItems:'center'}}><span className="live-dot"/>LIVE</span></div>
          {recent===null?<div style={{padding:12}}>{[1,2,3].map(i=><div key={i} className="skel" style={{height:44,marginBottom:8}}/>)}</div>
          :recent.length===0?<p style={{padding:20,color:'var(--text3)',fontSize:13}}>No jobs yet.</p>
          :recent.map(job=>(
            <div key={job.id} onClick={()=>setSelected(job)} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 18px',borderBottom:'1px solid var(--border2)',cursor:'pointer',transition:'background .12s'}} className="job-row">
              <div style={{width:34,height:34,borderRadius:10,background:'rgba(77,123,255,0.1)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--accent)',flexShrink:0}}><ICar/></div>
              <div style={{flex:1,minWidth:0}}><p style={{fontSize:13,fontWeight:700,color:'var(--text)',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{job.vehicle?.make} {job.vehicle?.model}</p><p style={{fontSize:11,color:'var(--text3)',margin:'2px 0 0'}}>{job.mechanic?.name} · {job.vehicle?.reg}</p></div>
              <div style={{flexShrink:0,textAlign:'right'}}><span style={{padding:'2px 8px',borderRadius:100,fontSize:9,fontWeight:700,fontFamily:'JetBrains Mono',background:job.status==='approved'?'rgba(0,255,136,0.1)':job.status==='pending_approval'?'rgba(255,184,0,0.1)':'rgba(255,80,80,0.1)',color:job.status==='approved'?'var(--green)':job.status==='pending_approval'?'var(--amber)':'var(--red)',border:'1px solid transparent'}}>{job.status==='pending_approval'?'PENDING':job.status?.toUpperCase()}</span></div>
            </div>
          ))}
        </div>
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:20,overflow:'hidden'}}>
          <div style={{padding:'14px 18px',borderBottom:'1px solid var(--border)'}}><h3 style={{fontSize:14,fontWeight:800,color:'var(--text)',margin:0}}>Most Requested Services</h3></div>
          <div style={{padding:'12px 18px'}}>
            {svcCounts.length===0?<p style={{color:'var(--text3)',fontSize:13}}>No data yet.</p>
            :svcCounts.map(([name,count],i)=>{const max=svcCounts[0][1];return(
              <div key={name} style={{marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:5,fontSize:12}}><span style={{fontWeight:600,color:'var(--text)'}}>{name}</span><span className="mono" style={{color:'var(--accent)',fontWeight:700}}>{count}×</span></div>
                <div style={{height:6,borderRadius:100,background:'var(--border)',overflow:'hidden'}}><div style={{height:'100%',borderRadius:100,background:'linear-gradient(90deg,var(--accent),var(--cyan))',width:`${(count/max)*100}%`,transition:'width .6s ease'}}/></div>
              </div>
            );})}
          </div>
        </div>
      </div>
      {selected&&<JobModal job={selected} onClose={()=>setSelected(null)} onStatusChange={setStatus} shopInfo={shopInfo}/>}
    </div>
  );
}

/* ─── SETTINGS VIEW ─── */
function SettingsView({user,profile,onSave}){
  const [name,setName]=useState(profile.name||'');
  const [shop,setShop]=useState(profile.shop||'');
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);
  const save=async()=>{setSaving(true);try{await db.ref(`users/${user.uid}`).update({name,shop});setSaved(true);setTimeout(()=>setSaved(false),2500);onSave({name,shop});}catch(e){alert(e.message);}setSaving(false);};

  const handleSignOut = async () => {
    try {
      await auth.signOut();
      window.location.href = 'login.html';
    } catch(e) { alert(e.message); }
  };

  return(
    <div style={{maxWidth:520}}>
      <h2 style={{fontSize:22,fontWeight:900,color:'var(--text)',margin:'0 0 20px'}}>Admin Settings</h2>
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:20,padding:24,display:'flex',flexDirection:'column',gap:14}}>
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:8}}>
          <img src={user.photoURL||`https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=1a4fff&color=fff`} alt="" style={{width:56,height:56,borderRadius:16,border:'2px solid var(--accent)'}}/>
          <div>
            <p style={{fontSize:15,fontWeight:800,color:'var(--text)',margin:0}}>{name||'Admin'}</p>
            <p style={{fontSize:12,color:'var(--text3)',margin:'3px 0 0'}}>{user.email}</p>
            <span style={{display:'inline-flex',padding:'2px 10px',borderRadius:100,background:'rgba(77,123,255,0.1)',color:'var(--accent)',fontSize:10,fontWeight:700,fontFamily:'JetBrains Mono',border:'1px solid rgba(77,123,255,0.2)',marginTop:4}}>ADMIN</span>
          </div>
        </div>
        <div><label style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:6,display:'block',letterSpacing:'0.5px'}}>ADMIN NAME</label><input className="field" value={name} onChange={e=>setName(e.target.value)} placeholder="Your name"/></div>
        <div><label style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:6,display:'block',letterSpacing:'0.5px'}}>WORKSHOP / SHOP NAME</label><input className="field" value={shop} onChange={e=>setShop(e.target.value)} placeholder="e.g. Vynix Auto Centre"/></div>
        <button className="btn-p" onClick={save} disabled={saving} style={{width:'100%',padding:'13px',marginTop:4}}>
          {saving?<ISpin/>:saved?<><ICheck/> Saved!</>:<><ICheck/> Save Settings</>}
        </button>
        <div style={{borderTop:'1px solid var(--border)',paddingTop:14}}>
          <p style={{fontSize:11,fontWeight:700,color:'var(--text3)',margin:'0 0 10px',letterSpacing:'0.5px'}}>DANGER ZONE</p>
          <button onClick={handleSignOut} style={{background:'rgba(224,48,48,0.08)',color:'var(--red)',border:'1px solid rgba(224,48,48,0.2)',borderRadius:12,padding:'11px 18px',fontFamily:'Inter',fontWeight:700,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',gap:7,width:'100%',justifyContent:'center'}}><ILogout/> Sign Out of Admin</button>
        </div>
      </div>
    </div>
  );
}

/* ─── MAIN APP ─── */
function App(){
  const [user,setUser]=useState(null);
  const [profile,setProfile]=useState({name:'',shop:''});
  const [view,setView]=useState('overview');
  const [ready,setReady]=useState(false);
  const [pendingCount,setPendingCount]=useState(0);
  const [dark,setDark]=useState(()=>{const s=localStorage.getItem('vynix_admin_dark');return s!==null?JSON.parse(s):true;});

  useEffect(()=>{
    localStorage.setItem('vynix_admin_dark',JSON.stringify(dark));
    document.documentElement.setAttribute('data-theme',dark?'dark':'light');
    document.getElementById('meta-theme').content=dark?'#070c1a':'#f0f4ff';
  },[dark]);

  useEffect(()=>{
    return auth.onAuthStateChanged(u=>{
      if(u){
        setUser(u);
        const ref=db.ref(`users/${u.uid}`);
        ref.on('value',snap=>{
          if(snap.exists()) setProfile(snap.val());
          else{const d={name:u.displayName||'Admin',shop:'VynixPanelB Admin'};ref.set(d);setProfile(d);}
        });
        setReady(true);
      }
      // if !u, the route guard (vanilla JS above) handles redirect
    });
  },[]);

  useEffect(()=>{
    const ref=db.ref('workshop_jobs');
    // FIX: Assign callback to variable to properly unmount and prevent silent breaking
    const cb = ref.on('value',snap=>{let c=0;snap.forEach(j=>{if(j.val().status==='pending_approval')c++;});setPendingCount(c);});
    return()=>ref.off('value', cb);
  },[]);

  if(!ready||!user) return null; // Auth gate overlay handles this state

  const NAV_ITEMS=[
    {id:'overview',l:'Overview',I:IDash},
    {id:'jobs',l:'Workshop Jobs',I:ICar,badge:pendingCount},
    {id:'database',l:'Car Database',I:IDB},
    {id:'settings',l:'Settings',I:()=><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>},
  ];

  const handleSignOut=async()=>{try{await auth.signOut();window.location.href='login.html';}catch(e){alert(e.message);}};

  return(
    <div style={{minHeight:'100dvh',display:'flex'}}>
      <nav className="sidebar-admin">
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8,padding:'4px 6px'}}>
          <div style={{width:36,height:36,padding:8,borderRadius:12,background:'linear-gradient(135deg,#1a4fff,#0033e6)',color:'#fff',flexShrink:0}}><IWrench/></div>
          <div><p style={{fontSize:14,fontWeight:900,color:'var(--text)',margin:0,letterSpacing:'-0.3px'}}>VynixPanelB</p><p style={{fontSize:9,color:'var(--amber)',margin:0,fontFamily:'JetBrains Mono',fontWeight:700,letterSpacing:'0.5px'}}>★ ADMIN</p></div>
        </div>
        <div style={{padding:'8px 14px',borderRadius:10,background:'rgba(0,255,136,0.06)',border:'1px solid rgba(0,255,136,0.15)',marginBottom:20,display:'flex',alignItems:'center',gap:7}}>
          <span className="live-dot"/><span style={{fontSize:11,fontWeight:600,color:'var(--green)'}}>System Live</span>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:3,flex:1}}>
          {NAV_ITEMS.map(({id,l,I,badge})=>(
            <button key={id} className={`snav ${view===id?'active':''}`} onClick={()=>setView(id)} style={{position:'relative'}}>
              <I/> {l}
              {badge>0&&<span className="notif-badge">{badge}</span>}
            </button>
          ))}
        </div>
        <div style={{borderTop:'1px solid var(--border)',paddingTop:16}}>
          <div style={{display:'flex',justifyContent:'center',marginBottom:14}}><DarkModePill dark={dark} onToggle={()=>setDark(!dark)}/></div>
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:14,background:'var(--surface)',border:'1px solid var(--border)'}}>
            <img src={user.photoURL||`https://ui-avatars.com/api/?name=${encodeURIComponent(profile.name)}&background=ffa500&color=fff`} alt="" style={{width:34,height:34,borderRadius:'50%',flexShrink:0,border:'2px solid var(--amber)'}}/>
            <div style={{overflow:'hidden',flex:1}}>
              <p style={{fontSize:12,fontWeight:700,color:'var(--text)',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{profile.name||'Admin'}</p>
              <p style={{fontSize:10,color:'var(--amber)',margin:'1px 0 0',fontFamily:'JetBrains Mono',fontWeight:600}}>ADMIN</p>
            </div>
            <button onClick={handleSignOut} title="Sign Out" style={{background:'none',border:'none',cursor:'pointer',color:'var(--text3)',display:'flex',padding:4,borderRadius:6,transition:'color .15s'}} onMouseOver={e=>e.currentTarget.style.color='var(--red)'} onMouseOut={e=>e.currentTarget.style.color='var(--text3)'}><ILogout/></button>
          </div>
        </div>
      </nav>
      <main style={{flex:1,padding:'28px 32px',overflowY:'auto',minHeight:'100dvh'}}>
        <div style={{maxWidth:1100,margin:'0 auto'}}>
          {view==='overview'&&<OverviewView shopInfo={profile}/>}
          {view==='jobs'&&<JobsView shopInfo={profile}/>}
          {view==='database'&&<CarDatabaseView/>}
          {view==='settings'&&<SettingsView user={user} profile={profile} onSave={setProfile}/>}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
