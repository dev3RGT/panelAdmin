    [data-theme="dark"] {

      --shadow:0 4px 24px rgba(0,0,0,0.4); --shadow-lg:0 8px 40px rgba(0,0,0,0.6);

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none;margin:0;transition:background .3s,color .3s}
    ::-webkit-scrollbar{width:6px;height:6px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    .surface{background:var(--surface);border:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
    .field{background:var(--input-bg);border:1px solid var(--input-border);color:var(--text);border-radius:12px;padding:11px 16px;width:100%;outline:none;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;transition:all .2s}
    .field:focus{background:rgba(77,123,255,0.08);border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
    .field::placeholder{color:var(--text3)}
    .btn-p{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:100px;padding:11px 22px;font-family:'Inter',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .22s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
    .btn-p:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--accent-glow)}
    .btn-p:active{transform:scale(0.97)}
    .btn-p:disabled{background:var(--input-bg);color:var(--text3);cursor:not-allowed;box-shadow:none;transform:none}
    .btn-g{background:var(--input-bg);color:var(--text2);border:1px solid var(--border);border-radius:100px;padding:10px 18px;font-family:'Inter',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
    .btn-g:hover{background:var(--border);color:var(--text)}
    .mono{font-family:'JetBrains Mono',monospace}
    @keyframes slideUp{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes shimmer{0%{background-position:-500px 0}100%{background-position:500px 0}}
    @keyframes overlayIn{0%{opacity:0}100%{opacity:1}}
    @keyframes modalIn{0%{opacity:0;transform:translate(-50%,-46%) scale(0.95)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
    @keyframes badgePop{0%{transform:scale(0.7);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
    @keyframes ringPulse{0%{box-shadow:0 0 0 0 rgba(77,123,255,0.4)}70%{box-shadow:0 0 0 10px rgba(77,123,255,0)}100%{box-shadow:0 0 0 0 rgba(77,123,255,0)}}

    .anim-up{animation:slideUp .32s cubic-bezier(.16,1,.3,1) forwards}

    .live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 1.5s ease-in-out infinite;margin-right:5px}
    .sidebar-admin{width:240px;min-width:240px;height:100vh;position:sticky;top:0;background:var(--bg2);border-right:1px solid var(--border);padding:20px 14px;display:flex;flex-direction:column;overflow-y:auto}
    .snav{display:flex;align-items:center;gap:11px;padding:11px 14px;border-radius:12px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--text2);border:1px solid transparent;transition:all .18s;width:100%;text-align:left}
    .snav.active{background:rgba(77,123,255,0.1);color:var(--accent);border-color:rgba(77,123,255,0.2)}
    .snav:hover:not(.active){background:var(--surface);color:var(--text)}
    .stat-card{padding:18px 20px;border-radius:18px;background:var(--surface);border:1px solid var(--border);transition:all .2s}
    .job-row{border-bottom:1px solid var(--border2);transition:background .15s;cursor:pointer}
    .job-row:hover{background:rgba(77,123,255,0.03)}
    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.4px;font-family:'JetBrains Mono',monospace}
    .tab-btn{padding:8px 18px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
    .tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .dm-pill{display:flex;align-items:center;background:var(--input-bg);border:1px solid var(--border);border-radius:100px;padding:3px;gap:2px;cursor:pointer}
    .dm-btn{width:30px;height:30px;border-radius:100px;display:flex;align-items:center;justify-content:center;transition:all .25s;color:var(--text3)}
    .dm-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px var(--accent-glow)}
    .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);animation:overlayIn .2s ease}
    .modal-box{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:201;background:var(--bg2);border:1px solid var(--border);border-radius:24px;width:min(92vw,680px);max-height:88vh;overflow-y:auto;padding:32px;box-shadow:var(--shadow-lg);animation:modalIn .3s cubic-bezier(.16,1,.3,1)}
    .notif-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;border-radius:100px;font-size:10px;font-weight:800;padding:1px 5px;font-family:'JetBrains Mono',monospace;animation:badgePop .3s ease;border:2px solid var(--bg2)}
    .car-db-row{padding:12px 16px;border-radius:12px;border:1px solid var(--border);background:var(--input-bg);margin-bottom:8px;transition:all .15s}
    .car-db-row:hover{border-color:var(--accent);background:rgba(77,123,255,0.04)}
    .tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-size:10px;font-weight:600;background:rgba(77,123,255,0.08);color:var(--accent);border:1px solid rgba(77,123,255,0.18);margin:2px;font-family:'JetBrains Mono'}
    .print-btn{background:linear-gradient(135deg,#00b86e,#007a4a);color:#fff;border:none;border-radius:100px;padding:10px 20px;font-family:'Inter',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px}

    .search-input{background:var(--input-bg);border:1px solid var(--input-border);color:var(--text);border-radius:12px;padding:9px 16px 9px 40px;outline:none;font-family:'Inter',sans-serif;font-size:13px;width:100%;transition:all .2s}

    .new-job-ring{animation:ringPulse 1.5s infinite}
  </style>

/* ─── PDF EXPORT (admin-only) ─── */
function exportJobPDF(job, shopInfo){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const pw=doc.internal.pageSize.getWidth();
  const shopName=shopInfo?.shop||'VynixPanelB Auto';
  const adminName=shopInfo?.name||'Admin';

  // Header
  doc.setFillColor(7,12,26); doc.rect(0,0,pw,42,'F');
  doc.setFillColor(26,79,255); doc.rect(0,0,4,42,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(20); doc.setTextColor(232,238,255);
  doc.text(shopName,14,16);
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(150,170,220);
  doc.text('Vehicle Service Quotation',14,24);
  doc.text(`Issued: ${new Date().toLocaleDateString('en-ZA',{day:'2-digit',month:'long',year:'numeric'})}`,14,31);
  doc.text(`Ref: JOB-${job.id.slice(-8).toUpperCase()}`,pw-14,24,{align:'right'});
  doc.text(`Authorised by: ${adminName}`,pw-14,31,{align:'right'});

  // APPROVED watermark
  if(job.status==='approved'){
    doc.setTextColor(0,255,136); doc.setFontSize(48); doc.setFont('helvetica','bold');
    doc.setGState(new doc.GState({opacity:0.06}));
    doc.text('APPROVED',pw/2,150,{align:'center',angle:45});
    doc.setGState(new doc.GState({opacity:1}));
  }

  // Vehicle
  doc.setFillColor(15,22,55); doc.roundedRect(10,48,pw-20,24,3,3,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(0,245,255);
  doc.text('VEHICLE INFORMATION',16,57);
  doc.setFont('helvetica','normal'); doc.setTextColor(200,210,240); doc.setFontSize(9);
  const v=job.vehicle||{};
  doc.text(`${v.make||'—'} ${v.model||'—'} ${v.year||''}`,16,64);
  doc.text(`Reg: ${v.reg||'—'}   Engine: ${v.engine||'—'}   Odometer: ${v.km||'—'} km`,16,70);
  if(v.vin) doc.text(`VIN: ${v.vin}`,16,76);

  // Mechanic
  doc.setFillColor(20,30,65); doc.roundedRect(pw-100,48,90,24,3,3,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(0,245,255);
  doc.text('MECHANIC',pw-96,57);
  doc.setFont('helvetica','normal'); doc.setTextColor(200,210,240); doc.setFontSize(9);
  doc.text(job.mechanic?.name||'—',pw-96,64);
  doc.text(job.mechanic?.shop||'—',pw-96,70);

  let y=(v.vin?78:72)+8;

  // Services table
  doc.autoTable({
    startY:y,
    head:[['Service','Parts','Qty','Labour (h)','Unit Price','Total (R)']],
    body:(job.services||[]).map(s=>[
      s.name||s.serviceId,
      (s.parts||[]).join(', ')||'—',
      s.qty||1,
      ((s.laborHours)||'—'),
      `R ${(s.unitPrice||s.total||0).toFixed(2)}`,
      `R ${(s.total||0).toFixed(2)}`
    ]),
    headStyles:{fillColor:[26,79,255],textColor:[255,255,255],fontStyle:'bold',fontSize:7.5},
    bodyStyles:{textColor:[30,40,80],fontSize:7.5,fillColor:[240,244,255]},
    alternateRowStyles:{fillColor:[228,234,255]},
    columnStyles:{0:{cellWidth:48},1:{cellWidth:42},2:{halign:'center',cellWidth:10},3:{halign:'center',cellWidth:18},4:{halign:'right',cellWidth:22},5:{halign:'right',fontStyle:'bold',cellWidth:22}},
    margin:{left:10,right:10},theme:'grid',
  });

  let fy=doc.lastAutoTable.finalY+8;
  const fin=job.financials||{};

  // Totals box
  doc.setFillColor(240,244,255); doc.roundedRect(pw-90,fy,80,52,3,3,'F');
  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(80,100,150);
  const rc=pw-14;
  doc.text(`Labour (${(fin.laborTotal/LABOR||0).toFixed(1)}h × R${LABOR})`,pw-92,fy+10,{align:'right'});
  doc.text(`R ${(fin.laborTotal||0).toFixed(2)}`,rc,fy+10,{align:'right'});
  doc.text('Parts & Materials',pw-92,fy+19,{align:'right'});
  doc.text(`R ${(fin.partsTotal||0).toFixed(2)}`,rc,fy+19,{align:'right'});
  doc.text('Subtotal',pw-92,fy+28,{align:'right'});
  doc.text(`R ${(fin.subtotal||0).toFixed(2)}`,rc,fy+28,{align:'right'});
  doc.text('VAT 15%',pw-92,fy+37,{align:'right'});
  doc.text(`R ${(fin.vat||0).toFixed(2)}`,rc,fy+37,{align:'right'});
  doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(26,79,255);
  doc.text('GRAND TOTAL',pw-92,fy+49,{align:'right'});
  doc.text(`R ${(fin.grandTotal||0).toFixed(2)}`,rc,fy+49,{align:'right'});

  // Notes
  if(job.notes){
    doc.setFillColor(255,240,200); doc.roundedRect(10,fy,pw-104,30,3,3,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(150,100,0);
    doc.text('MECHANIC NOTES',16,fy+9);
    doc.setFont('helvetica','normal'); doc.setTextColor(80,60,0); doc.setFontSize(8);
    const ns=doc.splitTextToSize(job.notes,pw-120);
    doc.text(ns,16,fy+17);
  }

  // Status stamp
  if(job.status==='approved'||job.status==='rejected'){
    const sc=job.status==='approved'?[0,180,110]:[224,48,48];
    doc.setDrawColor(...sc); doc.setLineWidth(1.5);
    doc.roundedRect(10,fy+56,50,14,3,3,'S');
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...sc);
    doc.text(job.status.toUpperCase(),35,fy+65,{align:'center'});
  }

  // Footer
  const ph=doc.internal.pageSize.getHeight();
  doc.setFillColor(7,12,26); doc.rect(0,ph-14,pw,14,'F');
  doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(100,120,160);
  doc.text(`VynixPanelB Admin Dashboard | This is an official quotation | Job ID: ${job.id}`,pw/2,ph-7,{align:'center'});
  doc.save(`Quote_${v.make||'Vehicle'}_${v.reg||'REG'}_${Date.now()}.pdf`);
}

/* ─── MAIN JOBS VIEW ─── */
function JobsView({shopInfo}){
  const [jobs,setJobs]=useState(null);
  const [filter,setFilter]=useState('all');
  const [search,setSearch]=useState('');
  const [selected,setSelected]=useState(null);
  const [prevCount,setPrevCount]=useState(0);
  const [newAlert,setNewAlert]=useState(false);

  useEffect(()=>{
    const ref=db.ref('workshop_jobs').limitToLast(100);
    ref.on('value',snap=>{
      if(!snap.exists()){setJobs([]);return;}
      const arr=[];
      snap.forEach(c=>arr.push({id:c.key,...c.val()}));
      arr.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
      if(arr.length>prevCount&&prevCount>0) setNewAlert(true);
      setPrevCount(arr.length);
      setJobs(arr);
    });
    return()=>ref.off();
  },[]);

  useEffect(()=>{if(newAlert){const t=setTimeout(()=>setNewAlert(false),4000);return()=>clearTimeout(t);}},[newAlert]);

  const setStatus=async(id,s)=>db.ref(`workshop_jobs/${id}`).update({status:s,updatedAt:Date.now()});

  const filtered=useMemo(()=>{
    if(!jobs) return [];
    let r=jobs;
    if(filter!=='all') r=r.filter(j=>j.status===filter);
    if(search.trim()){const q=search.toLowerCase();r=r.filter(j=>`${j.vehicle?.make} ${j.vehicle?.model} ${j.vehicle?.reg} ${j.mechanic?.name}`.toLowerCase().includes(q));}
    return r;
  },[jobs,filter,search]);

  const revenue=jobs?jobs.filter(j=>j.status==='approved').reduce((s,j)=>s+(j.financials?.grandTotal||0),0):0;

  return(
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      {newAlert&&(
        <div className="anim-up" style={{padding:'12px 18px',borderRadius:14,background:'rgba(77,123,255,0.12)',border:'1px solid rgba(77,123,255,0.3)',display:'flex',alignItems:'center',gap:10}}>
          <ISparkle/> <span style={{fontSize:13,fontWeight:700,color:'var(--accent)'}}>New job received from mechanic!</span>
        </div>
      )}

      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
        {[
          {l:'Total Jobs',v:jobs?jobs.length:'–',c:'var(--accent)'},
          {l:'Pending',v:jobs?jobs.filter(j=>j.status==='pending_approval').length:'–',c:'var(--amber)'},
          {l:'Approved',v:jobs?jobs.filter(j=>j.status==='approved').length:'–',c:'var(--green)'},
          {l:'Revenue',v:jobs?`R ${Math.round(revenue).toLocaleString()}`:'–',c:'var(--green)'},
        ].map(s=>(
          <div key={s.l} className="stat-card">
            <p style={{fontSize:10,fontWeight:700,color:'var(--text3)',marginBottom:8,letterSpacing:'0.5px'}}>{s.l.toUpperCase()}</p>
            <p className="mono" style={{fontSize:22,fontWeight:800,color:s.c,margin:0}}>{s.v}</p>
          </div>
        ))}
      </div>

      {/* Filters */}
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',gap:6}}>
          {[['all','All'],['pending_approval','Pending'],['approved','Approved'],['rejected','Rejected']].map(([val,lbl])=>(
            <button key={val} className={`tab-btn ${filter===val?'active':''}`} onClick={()=>setFilter(val)}>{lbl}</button>
          ))}
        </div>
        <div style={{position:'relative'}}>
          <div style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--text3)'}}><ISearch/></div>
          <input className="search-input" style={{paddingLeft:36,width:240}} placeholder="Search jobs…" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
      </div>

      {/* Jobs Table */}
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:20,overflow:'hidden'}}>
        <div style={{padding:'14px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <h3 style={{fontSize:15,fontWeight:800,color:'var(--text)',margin:0}}>Workshop Jobs</h3>
            <span style={{display:'inline-flex',alignItems:'center',fontSize:11,color:'var(--green)',fontFamily:'JetBrains Mono',fontWeight:600}}>
              <span className="live-dot"/>LIVE
            </span>
          </div>
          <p style={{fontSize:12,color:'var(--text3)',margin:0}}>{filtered.length} job(s)</p>
        </div>

        {/* Column Headers */}
        <div style={{display:'grid',gridTemplateColumns:'2fr 1.5fr 1.2fr 1fr 1fr 120px',gap:16,padding:'10px 20px',borderBottom:'1px solid var(--border)',background:'var(--surface2)'}}>
          {['Vehicle','Mechanic','Reg / Year','Services','Total','Status'].map(h=>(
            <span key={h} className="mono" style={{fontSize:9,fontWeight:700,color:'var(--text3)',letterSpacing:'0.5px'}}>{h}</span>
          ))}
        </div>

        {jobs===null?(
          <div style={{padding:16,display:'flex',flexDirection:'column',gap:8}}>
            {[1,2,3,4].map(i=><div key={i} className="skel" style={{height:48}}/>)}
          </div>
        ):filtered.length===0?(
          <div style={{textAlign:'center',padding:'48px 24px',color:'var(--text3)',fontSize:14}}>No jobs match this filter.</div>
        ):(
          filtered.map(job=>(
            <div key={job.id} className="job-row" onClick={()=>setSelected(job)}>
              <div style={{display:'grid',gridTemplateColumns:'2fr 1.5fr 1.2fr 1fr 1fr 120px',gap:16,padding:'14px 20px',alignItems:'center'}}>
                <div>
                  <p style={{fontSize:13,fontWeight:700,color:'var(--text)',margin:0}}>{job.vehicle?.make} {job.vehicle?.model}</p>
                  <p style={{fontSize:11,color:'var(--text3)',margin:'2px 0 0'}}>{job.vehicle?.engine}</p>
                </div>
                <div>
                  <p style={{fontSize:13,fontWeight:600,color:'var(--text2)',margin:0}}>{job.mechanic?.name||'—'}</p>
                  <p style={{fontSize:11,color:'var(--text3)',margin:'2px 0 0'}}>{job.mechanic?.shop||'—'}</p>
                </div>
                <div>
                  <p className="mono" style={{fontSize:12,fontWeight:700,color:'var(--text)',margin:0}}>{job.vehicle?.reg||'—'}</p>
                  <p style={{fontSize:11,color:'var(--text3)',margin:'2px 0 0'}}>{job.vehicle?.year||'—'}</p>
                </div>
                <span style={{fontSize:13,fontWeight:600,color:'var(--text2)'}}>{(job.services||[]).length} service(s)</span>
                <span className="mono" style={{fontSize:13,fontWeight:700,color:'var(--accent)'}}>R {(job.financials?.grandTotal||0).toFixed(0)}</span>
                <div style={{display:'flex',gap:6,alignItems:'center',justifyContent:'space-between'}}>
                  <span style={{padding:'3px 9px',borderRadius:100,fontSize:9,fontWeight:700,fontFamily:'JetBrains Mono',
                    background:job.status==='approved'?'rgba(0,255,136,0.1)':job.status==='rejected'?'rgba(255,80,80,0.1)':'rgba(255,184,0,0.1)',
                    color:job.status==='approved'?'var(--green)':job.status==='rejected'?'var(--red)':'var(--amber)',
                    border:`1px solid ${job.status==='approved'?'rgba(0,255,136,0.2)':job.status==='rejected'?'rgba(255,80,80,0.2)':'rgba(255,184,0,0.2)'}`}}>
                    {job.status==='pending_approval'?'PENDING':job.status==='approved'?'APPROVED':'REJECTED'}
                  </span>
                  <span style={{color:'var(--text3)',fontSize:12}}>›</span>
                </div>
              </div>
            </div>
          ))
        )}
      </div>

      {selected&&<JobModal job={selected} onClose={()=>setSelected(null)} onStatusChange={setStatus} shopInfo={shopInfo}/>}
    </div>
  );
}

/* ─── OVERVIEW / ANALYTICS ─── */
function OverviewView({shopInfo}){
  const [jobs,setJobs]=useState(null);
  const [recent,setRecent]=useState(null);

  useEffect(()=>{
    const ref=db.ref('workshop_jobs').limitToLast(50);
    ref.on('value',snap=>{
      if(!snap.exists()){setJobs([]);setRecent([]);return;}
      const arr=[];
      snap.forEach(c=>arr.push({id:c.key,...c.val()}));
      arr.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
      setJobs(arr);
      setRecent(arr.slice(0,5));
    });
    return()=>ref.off();
  },[]);

  const setStatus=async(id,s)=>db.ref(`workshop_jobs/${id}`).update({status:s,updatedAt:Date.now()});
  const [selected,setSelected]=useState(null);

  const pending=jobs?jobs.filter(j=>j.status==='pending_approval').length:0;
  const approved=jobs?jobs.filter(j=>j.status==='approved').length:0;
  const revenue=jobs?jobs.filter(j=>j.status==='approved').reduce((s,j)=>s+(j.financials?.grandTotal||0),0):0;

  // Most common services
  const svcCounts=useMemo(()=>{
    if(!jobs) return [];
    const c={};
    jobs.forEach(j=>(j.services||[]).forEach(s=>{c[s.name]=(c[s.name]||0)+1;}));
    return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,5);
  },[jobs]);

  return(
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      <div>
        <h2 style={{fontSize:22,fontWeight:900,color:'var(--text)',margin:0}}>Admin Overview</h2>
        <p style={{fontSize:13,color:'var(--text2)',margin:'4px 0 0'}}>Real-time workshop intelligence</p>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
        {[
          {l:'Pending Approval',v:pending,c:'var(--amber)',icon:'⏳',sub:'Awaiting your review'},
          {l:'Approved Today',v:approved,c:'var(--green)',icon:'✅',sub:'Revenue generating'},
          {l:'Approved Revenue',v:`R ${Math.round(revenue).toLocaleString()}`,c:'var(--green)',icon:'💰',sub:'Incl. VAT'},
        ].map(s=>(
          <div key={s.l} className="stat-card" style={{display:'flex',flexDirection:'column',gap:10}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <p style={{fontSize:10,fontWeight:700,color:'var(--text3)',margin:0,letterSpacing:'0.5px'}}>{s.l.toUpperCase()}</p>
              <span style={{fontSize:20}}>{s.icon}</span>
            </div>
            <p className="mono" style={{fontSize:26,fontWeight:900,color:s.c,margin:0}}>{s.v}</p>
            <p style={{fontSize:11,color:'var(--text3)',margin:0}}>{s.sub}</p>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        {/* Recent Jobs */}
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:20,overflow:'hidden'}}>
          <div style={{padding:'14px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:8}}>
            <h3 style={{fontSize:14,fontWeight:800,color:'var(--text)',margin:0}}>Recent Arrivals</h3>
            <span style={{fontSize:10,color:'var(--green)',fontFamily:'JetBrains Mono',fontWeight:600,display:'flex',alignItems:'center'}}><span className="live-dot"/>LIVE</span>
          </div>
          {recent===null?<div style={{padding:12}}>{[1,2,3].map(i=><div key={i} className="skel" style={{height:44,marginBottom:8}}/>)}</div>
          :recent.length===0?<p style={{padding:20,color:'var(--text3)',fontSize:13}}>No jobs yet.</p>
          :recent.map(job=>(
            <div key={job.id} onClick={()=>setSelected(job)} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 18px',borderBottom:'1px solid var(--border2)',cursor:'pointer',transition:'background .12s'}} className="job-row">
              <div style={{width:34,height:34,borderRadius:10,background:'rgba(77,123,255,0.1)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--accent)',flexShrink:0}}><ICar/></div>
              <div style={{flex:1,minWidth:0}}>
                <p style={{fontSize:13,fontWeight:700,color:'var(--text)',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{job.vehicle?.make} {job.vehicle?.model}</p>
                <p style={{fontSize:11,color:'var(--text3)',margin:'2px 0 0'}}>{job.mechanic?.name} · {job.vehicle?.reg}</p>
              </div>
              <div style={{flexShrink:0,textAlign:'right'}}>
                <span style={{padding:'2px 8px',borderRadius:100,fontSize:9,fontWeight:700,fontFamily:'JetBrains Mono',
                  background:job.status==='approved'?'rgba(0,255,136,0.1)':job.status==='pending_approval'?'rgba(255,184,0,0.1)':'rgba(255,80,80,0.1)',
                  color:job.status==='approved'?'var(--green)':job.status==='pending_approval'?'var(--amber)':'var(--red)',
                  border:'1px solid transparent'}}>{job.status==='pending_approval'?'PENDING':job.status?.toUpperCase()}</span>
              </div>
            </div>
          ))}
        </div>

        {/* Top Services */}
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:20,overflow:'hidden'}}>
          <div style={{padding:'14px 18px',borderBottom:'1px solid var(--border)'}}>
            <h3 style={{fontSize:14,fontWeight:800,color:'var(--text)',margin:0}}>Most Requested Services</h3>
          </div>
          <div style={{padding:'12px 18px'}}>
            {svcCounts.length===0?<p style={{color:'var(--text3)',fontSize:13}}>No data yet.</p>
            :svcCounts.map(([name,count],i)=>{
              const max=svcCounts[0][1];
              return(
                <div key={name} style={{marginBottom:14}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:5,fontSize:12}}>
                    <span style={{fontWeight:600,color:'var(--text)'}}>{name}</span>
                    <span className="mono" style={{color:'var(--accent)',fontWeight:700}}>{count}×</span>
                  </div>
                  <div style={{height:6,borderRadius:100,background:'var(--border)',overflow:'hidden'}}>
                    <div style={{height:'100%',borderRadius:100,background:`linear-gradient(90deg,var(--accent),var(--cyan))`,width:`${(count/max)*100}%`,transition:'width .6s ease'}}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {selected&&<JobModal job={selected} onClose={()=>setSelected(null)} onStatusChange={setStatus} shopInfo={shopInfo}/>}
    </div>
  );
}

        <p style={{textAlign:'center',fontSize:13,color:'var(--text2)',marginBottom:24}}>Sign in with your admin Google account to manage the workshop</p>
        <div style={{display:'flex',justifyContent:'center',marginBottom:24}}><DarkModePill dark={dark} onToggle={()=>setDark(!dark)}/></div>
        <button onClick={login} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:12,padding:'15px 20px',borderRadius:100,fontFamily:'Inter',fontWeight:700,fontSize:15,background:'var(--input-bg)',border:'1px solid var(--border)',color:'var(--text)',cursor:'pointer',transition:'all .2s'}}>
          <IGoog/> Sign in with Google
        </button>
      </div>
    </div>
  );

  const NAV_ITEMS=[
    {id:'overview',l:'Overview',I:IDash},
    {id:'jobs',l:'Workshop Jobs',I:ICar,badge:pendingCount},
    {id:'database',l:'Car Database',I:IDB},
    {id:'settings',l:'Settings',I:()=><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>},
  ];

  return(
    <div style={{minHeight:'100dvh',display:'flex'}}>
      {/* Sidebar */}
      <nav className="sidebar-admin">
        {/* Logo */}
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8,padding:'4px 6px'}}>
          <div style={{width:36,height:36,padding:8,borderRadius:12,background:'linear-gradient(135deg,#1a4fff,#0033e6)',color:'#fff',flexShrink:0}}><IWrench/></div>
          <div>
            <p style={{fontSize:14,fontWeight:900,color:'var(--text)',margin:0,letterSpacing:'-0.3px'}}>VynixPanelB</p>
            <p style={{fontSize:9,color:'var(--amber)',margin:0,fontFamily:'JetBrains Mono',fontWeight:700,letterSpacing:'0.5px'}}>★ ADMIN</p>
          </div>
        </div>

        {/* Live indicator */}
        <div style={{padding:'8px 14px',borderRadius:10,background:'rgba(0,255,136,0.06)',border:'1px solid rgba(0,255,136,0.15)',marginBottom:20,display:'flex',alignItems:'center',gap:7}}>
          <span className="live-dot"/>
          <span style={{fontSize:11,fontWeight:600,color:'var(--green)'}}>System Live</span>
        </div>

        {/* Nav */}
        <div style={{display:'flex',flexDirection:'column',gap:3,flex:1}}>
          {NAV_ITEMS.map(({id,l,I,badge})=>(
            <button key={id} className={`snav ${view===id?'active':''}`} onClick={()=>setView(id)} style={{position:'relative'}}>
              <I/> {l}
              {badge>0&&<span className="notif-badge">{badge}</span>}
            </button>
          ))}
        </div>

        {/* Bottom */}
        <div style={{borderTop:'1px solid var(--border)',paddingTop:16}}>
          <div style={{display:'flex',justifyContent:'center',marginBottom:14}}><DarkModePill dark={dark} onToggle={()=>setDark(!dark)}/></div>
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:14,background:'var(--surface)',border:'1px solid var(--border)'}}>
            <img src={user.photoURL||`https://ui-avatars.com/api/?name=${encodeURIComponent(profile.name)}&background=ffa500&color=fff`} alt="" style={{width:34,height:34,borderRadius:'50%',flexShrink:0,border:'2px solid var(--amber)'}}/>
            <div style={{overflow:'hidden',flex:1}}>
              <p style={{fontSize:12,fontWeight:700,color:'var(--text)',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{profile.name||'Admin'}</p>
              <p style={{fontSize:10,color:'var(--amber)',margin:'1px 0 0',fontFamily:'JetBrains Mono',fontWeight:600}}>ADMIN</p>
            </div>
          </div>
        </div>
      </nav>

      {/* Main */}
      <main style={{flex:1,padding:'28px 32px',overflowY:'auto',minHeight:'100dvh'}}>
        <div style={{maxWidth:1100,margin:'0 auto'}}>
          {view==='overview'&&<OverviewView shopInfo={profile}/>}
          {view==='jobs'&&<JobsView shopInfo={profile}/>}
          {view==='database'&&<CarDatabaseView/>}
          {view==='settings'&&<SettingsView user={user} profile={profile} onSave={setProfile}/>}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
